name: Validate Dataform

on:
  push:
    branches:
      - main
      - prod
    paths:
      - 'dataform/**'
  pull_request:
    paths:
      - 'dataform/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Dataform CLI
        run: npm install -g @dataform/cli

      - name: Compile Dataform
        working-directory: ./dataform
        run: dataform compile

      # Note: dataform test runs unit tests defined in dataform (if any)
      - name: Test Dataform
        working-directory: ./dataform
        run: dataform test
